<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Pixies · Magia v1.9</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

/* ── ROOT LAYOUT: body is position:relative, everything absolute ── */
html{width:100%;height:100%;overflow:hidden;background:#060010;}
body{
  width:100%;height:100%;overflow:hidden;
  background:#060010;color:#f0e8ff;
  font-family:'Syne',sans-serif;
  user-select:none;-webkit-user-select:none;
  position:relative;
}

/* ── HEADER: fixed at top, 48px ── */
#pvsHeader{
  position:absolute;top:0;left:0;right:0;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:rgba(10,0,20,.98);
  border-bottom:1px solid rgba(255,255,255,.07);
  z-index:10;
}
.pvs-brand{font-size:12px;font-family:'Space Mono',monospace;color:#7a6b8a;letter-spacing:3px;text-transform:uppercase;}
.pvs-brand span{color:#ff2d8f;}
#pvsClock{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:#f0e8ff;}
#orderCountBadge{padding:5px 12px;border-radius:8px;background:rgba(255,255,255,.05);color:#7a6b8a;font-family:'Space Mono',monospace;font-size:10px;border:1px solid rgba(255,255,255,.07);}

/* ── RECUPERAR BAR: fixed at bottom, 52px ── */
#recuperarBar{
  position:absolute;bottom:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,0,20,.98);
  border-top:1px solid rgba(255,255,255,.07);
  z-index:10;
}
.btn-recuperar{
  padding:11px 36px;border-radius:14px;
  border:2px solid #ff2d8f;
  background:rgba(255,45,143,.12);
  color:#ff2d8f;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.5px;
}
.btn-recuperar:active{background:rgba(255,45,143,.28);}

/* ── GRID: absolutely positioned between header and footer ── */
#pvsGrid{
  position:absolute;
  top:48px;bottom:52px;left:0;right:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:6px;
  padding:6px;
  overflow:hidden;
}

/* ── ORDER CARD ── */
.order-card{
  border-radius:12px;border:2px solid;
  display:flex;flex-direction:column;
  cursor:pointer;position:relative;
  background:#08001a;
  overflow:hidden;
  /* CRITICAL: prevent card from growing beyond grid cell */
  min-height:0;min-width:0;
}
.order-card.highlighted{box-shadow:0 0 20px rgba(255,45,143,.4);}
.order-card.span2{grid-column:span 2;}
.order-card.span3{grid-column:span 3;}
.order-card.span4{grid-column:span 4;}

/* ── DELIVERY ── */
.order-card.delivery{animation:deliveryBorder 2s linear infinite;}
@keyframes deliveryBorder{0%{border-color:#ff2d8f;}16%{border-color:#ff6b35;}33%{border-color:#d4ff00;}50%{border-color:#00e676;}66%{border-color:#00e5ff;}83%{border-color:#bf00ff;}100%{border-color:#ff2d8f;}}

/* ── CARD HEADER ── */
.oc-header{
  padding:4px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:6px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.oc-header-left{display:flex;align-items:center;gap:6px;min-width:0;flex:1;flex-wrap:wrap;}
.oc-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;flex-shrink:0;}
.oc-table{font-size:11px;font-weight:800;color:#f0e8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-parallevar{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.3);color:#00e5ff;flex-shrink:0;}
.oc-timer{font-family:'Space Mono',monospace;font-size:10px;color:#7a6b8a;flex-shrink:0;white-space:nowrap;}

/* ── APÚRATE TAG ── */
.apurate-tag{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;padding:1px 6px;border-radius:4px;background:linear-gradient(90deg,#ff2d8f,#bf00ff,#00e5ff,#d4ff00,#ff2d8f);background-size:200% auto;animation:rainbowShift 1.5s linear infinite;color:white;flex-shrink:0;display:none;}
.apurate-tag.show{display:inline-block;}
@keyframes rainbowShift{to{background-position:200% center;}}

/* ── DELIVERY TAG ── */
.delivery-tag{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;padding:1px 6px;border-radius:4px;background:linear-gradient(90deg,#ff2d8f,#bf00ff,#00e5ff,#d4ff00,#ff2d8f);background-size:200% auto;animation:rainbowShift 1.5s linear infinite;color:white;flex-shrink:0;}

/* ── CARD BODY: scrolls if overflow ── */
.oc-body{
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  padding:3px 8px 4px;
  min-height:0;
}
.oc-body::-webkit-scrollbar{display:none;}

/* ── DRINK ROW ── */
.drink-col{padding-top:3px;border-top:1px solid rgba(255,255,255,.05);}
.drink-col:first-child{border-top:none;padding-top:0;}
.drink-label{font-size:8px;font-family:'Space Mono',monospace;color:#7a6b8a;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.drink-sabor{font-size:11px;font-weight:800;line-height:1.2;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drink-size{font-size:10px;color:#d4ff00;font-weight:700;margin-bottom:2px;line-height:1.2;}
.drink-candies{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px;}
.candy-cell{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;padding:1px 3px;border-radius:3px;background:rgba(255,45,143,.12);border:1px solid rgba(255,45,143,.25);color:#ff9de8;line-height:1.3;}
.candy-cell.multi{background:rgba(212,255,0,.1);border-color:rgba(212,255,0,.35);color:#d4ff00;}
.drink-extras{display:flex;flex-wrap:wrap;gap:2px;}
.extra-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);color:#00e5ff;line-height:1.3;}

/* ── WARN BADGE ── */
.warn-badge{position:absolute;bottom:6px;right:6px;font-size:14px;display:none;pointer-events:none;}
.warn-badge.show{display:block;}

/* ── APÚRATE BAR ── */
.apurate-bar{
  position:absolute;bottom:0;left:0;right:0;height:20px;
  display:none;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;font-style:italic;
  border-radius:0 0 10px 10px;
  animation:apurateColors 1.2s linear infinite,apurateFlash .6s ease-in-out infinite;
}
.apurate-bar.show{display:flex;}
@keyframes apurateColors{0%{background:rgba(255,45,143,.3);color:#ff2d8f;}25%{background:rgba(212,255,0,.25);color:#d4ff00;}50%{background:rgba(0,229,255,.25);color:#00e5ff;}75%{background:rgba(191,0,255,.25);color:#df88ff;}100%{background:rgba(255,45,143,.3);color:#ff2d8f;}}
@keyframes apurateFlash{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ── EMPTY SLOT ── */
.empty-slot{
  border-radius:12px;border:1px dashed rgba(255,255,255,.05);
  background:rgba(255,255,255,.005);
  display:flex;align-items:center;justify-content:center;
  min-height:0;min-width:0;
}
.empty-dot{font-size:16px;opacity:.05;}

/* ── EMPTY STATE ── */
#emptyState{
  position:absolute;top:48px;bottom:52px;left:0;right:0;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;pointer-events:none;z-index:5;
}
#emptyState.show{display:flex;}
.es-icon{font-size:48px;opacity:.1;}
.es-text{font-size:11px;font-family:'Space Mono',monospace;color:#7a6b8a;letter-spacing:2px;}

/* ── RECALL DRAWER ── */
#recallDrawer{
  position:fixed;bottom:-100%;left:0;right:0;height:44vh;
  background:rgba(8,0,20,.99);border-top:2px solid rgba(255,45,143,.3);
  border-radius:20px 20px 0 0;z-index:100;
  transition:bottom .3s cubic-bezier(0.34,1.56,0.64,1);
  padding:12px 14px;display:flex;flex-direction:column;
}
#recallDrawer.open{bottom:0;}
.recall-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0;}
.recall-title{font-size:14px;font-weight:800;color:#ff2d8f;letter-spacing:1px;}
.btn-close-recall{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#7a6b8a;font-size:18px;cursor:pointer;}
#recallList{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:8px;padding-bottom:4px;}
#recallList::-webkit-scrollbar{height:3px;}
#recallList::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.recall-card{flex-shrink:0;width:190px;border-radius:10px;border:1px solid;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:3px;}
.recall-card:active{opacity:.6;}
.rc-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.rc-num{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.rc-table{font-size:10px;color:#7a6b8a;font-family:'Space Mono',monospace;}
.rc-drink{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-size{font-size:10px;color:#d4ff00;font-weight:700;}
.rc-cells{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.rc-cell{font-family:'Space Mono',monospace;font-size:8px;padding:1px 3px;border-radius:3px;background:rgba(255,45,143,.12);border:1px solid rgba(255,45,143,.2);color:#ff9de8;}
.rc-tap-hint{font-size:9px;font-family:'Space Mono',monospace;color:#7a6b8a;margin-top:4px;text-align:center;letter-spacing:1px;}
</style>
</head>
<body>

<div id="pvsHeader">
  <div class="pvs-brand"><span>MAGIA</span> <span style="font-size:9px;color:#7a6b8a;">v1.9</span></div>
  <div id="pvsClock">00:00:00</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="orderCountBadge">0 órdenes</div>
  </div>
</div>

<div id="pvsGrid"></div>

<div id="emptyState">
  <div class="es-icon">🍧</div>
  <div class="es-text">ESPERANDO ÓRDENES...</div>
</div>

<div id="recuperarBar">
  <button class="btn-recuperar" onclick="openRecall()">↩ Recuperar Orden</button>
</div>

<div id="recallDrawer">
  <div class="recall-header">
    <div class="recall-title">↩ TOCA PARA RECUPERAR</div>
    <button class="btn-close-recall" onclick="closeRecall()">✕</button>
  </div>
  <div id="recallList"></div>
</div>

<script>
var FIREBASE_CONFIG={apiKey:"AIzaSyDE0SAPuxvu0G1Ylfo0VG5rY1UDrJHEA9c",authDomain:"pixies-cocktails.firebaseapp.com",databaseURL:"https://pixies-cocktails-default-rtdb.firebaseio.com",projectId:"pixies-cocktails",storageBucket:"pixies-cocktails.firebasestorage.app",messagingSenderId:"154370181028",appId:"1:154370181028:web:a2c94706ec0e61206a2331"};
if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
var db=firebase.database();

var COLORS=[
  {border:'#ff2d8f',bg:'rgba(255,45,143,.1)',text:'#ff2d8f'},
  {border:'#00e5ff',bg:'rgba(0,229,255,.08)',text:'#00e5ff'},
  {border:'#d4ff00',bg:'rgba(212,255,0,.08)',text:'#d4ff00'},
  {border:'#00e676',bg:'rgba(0,230,118,.08)',text:'#00e676'},
  {border:'#bf00ff',bg:'rgba(191,0,255,.1)',text:'#df88ff'},
  {border:'#ff6b35',bg:'rgba(255,107,53,.1)',text:'#ff9a70'},
  {border:'#ff2d8f',bg:'rgba(255,45,143,.1)',text:'#ff2d8f'},
  {border:'#00e5ff',bg:'rgba(0,229,255,.08)',text:'#00e5ff'},
];

var orders={},colorMap={},colorCounter=0,tapMap={},recallList=[];

// Clock
function updateClock(){var n=new Date();document.getElementById('pvsClock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(updateClock,1000);updateClock();

// Firebase
db.ref('orders').on('value',function(snap){
  var data=snap.val()||{},fresh={};
  Object.keys(data).forEach(function(k){
    if(data[k].status==='pending'){
      fresh[k]=data[k];
      if(colorMap[k]===undefined){colorMap[k]=colorCounter%8;colorCounter++;}
    }
  });
  orders=fresh;render();
});

db.ref('completed_orders').orderByChild('completedAt').limitToLast(20).once('value',function(snap){
  snap.forEach(function(c){recallList.push({key:c.key,order:c.val(),colorIdx:colorCounter%8});colorCounter++;});
  recallList.reverse();
});

function getSorted(){
  return Object.keys(orders).map(function(k){return{key:k,order:orders[k]};})
    .sort(function(a,b){
      if(a.order.isDelivery&&!b.order.isDelivery)return -1;
      if(!a.order.isDelivery&&b.order.isDelivery)return 1;
      return(a.order.timestamp||0)-(b.order.timestamp||0);
    });
}

function getSpan(order){return Math.min(4,Math.max(1,(order.items||[]).length));}

function getElapsed(ts){
  if(!ts)return{str:'0:00',mins:0};
  var secs=Math.floor((Date.now()-ts)/1000);
  return{str:Math.floor(secs/60)+':'+(secs%60<10?'0':'')+secs%60,mins:secs/60};
}

function renderDrink(item,idx,total){
  var h='<div class="drink-col">';
  if(total>1)h+='<div class="drink-label">Bebida '+(idx+1)+'</div>';
  h+='<div class="drink-sabor" style="color:'+(item.fc||'#f0e8ff')+'">'+(item.fe||'')+' '+item.fn+'</div>';
  h+='<div class="drink-size">'+(item.se||'')+' '+(item.sn||'')+(item.soz?' · '+item.soz:'')+'</div>';
  var cells=item.candyCells||[];
  if(cells.length){
    h+='<div class="drink-candies">';
    cells.forEach(function(cc){var m=(cc.qty||1)>1;h+='<span class="candy-cell'+(m?' multi':'')+'">'+cc.cell+(m?' ×'+cc.qty:'')+'</span>';});
    h+='</div>';
  }
  if(item.ex&&item.ex>0)h+='<div class="drink-candies"><span class="candy-cell multi">+'+item.ex+' extra</span></div>';
  var ex=item.selExtras||[];
  if(ex.length){h+='<div class="drink-extras">';ex.forEach(function(e){h+='<span class="extra-tag">'+e.e+' '+e.n+'</span>';});h+='</div>';}
  h+='</div>';
  return h;
}

function renderCard(key,order){
  var ci=colorMap[key]!==undefined?colorMap[key]:0,col=COLORS[ci];
  var items=order.items||[],span=getSpan(order);
  var tapped=tapMap[key]&&tapMap[key].count===1;
  var ts=order.timestamp||0,el=getElapsed(ts);
  var isParaLlevar=(order.table==='🥡 Para Llevar');
  var spanClass=span>1?' span'+span:'';

  var h='<div class="order-card'+(order.isDelivery?' delivery':'')+(tapped?' highlighted':'')+spanClass+'"'
    +' id="oc-'+key+'" style="border-color:'+col.border+'" onclick="handleTap(\''+key+'\')">';

  // Header
  h+='<div class="oc-header" style="background:'+col.bg+'">';
  h+='<div class="oc-header-left">';
  h+='<div class="oc-num" style="color:'+col.text+'">#'+String(order.num||0).padStart(2,'0')+'</div>';
  if(order.isDelivery)h+='<span class="delivery-tag">📦 ENTREGA</span>';
  if(isParaLlevar)h+='<span class="oc-parallevar">🥡 Para Llevar</span>';
  else h+='<div class="oc-table">📍 '+(order.table||'Sin mesa')+'</div>';
  h+='<span class="apurate-tag'+(el.mins>=5?' show':'')+'" id="apt-'+key+'">¡APÚRATE!</span>';
  h+='</div>';
  h+='<span class="oc-timer" data-ts="'+ts+'">⏱ '+el.str+'</span>';
  h+='</div>';

  // Drinks
  h+='<div class="oc-body">';
  items.forEach(function(item,idx){h+=renderDrink(item,idx,items.length);});
  h+='</div>';

  // Badges
  h+='<div class="warn-badge'+(el.mins>=3&&el.mins<5?' show':'')+'" id="wb-'+key+'">⚠️</div>';
  h+='<div class="apurate-bar'+(el.mins>=5?' show':'')+'" id="ab-'+key+'">¡APÚRATE!</div>';
  h+='</div>';
  return h;
}

function render(){
  var sorted=getSorted(),count=sorted.length;
  document.getElementById('orderCountBadge').textContent=count+(count===1?' orden':' órdenes');
  document.getElementById('emptyState').classList.toggle('show',count===0);

  var html='',slotsUsed=0;
  for(var i=0;i<sorted.length&&slotsUsed<8;i++){
    var span=Math.min(getSpan(sorted[i].order),8-slotsUsed);
    html+=renderCard(sorted[i].key,sorted[i].order);
    slotsUsed+=span;
  }
  while(slotsUsed<8){html+='<div class="empty-slot"><div class="empty-dot">✦</div></div>';slotsUsed++;}
  document.getElementById('pvsGrid').innerHTML=html;
}

// Timer updates
setInterval(function(){
  document.querySelectorAll('.oc-timer[data-ts]').forEach(function(el){
    var ts=parseInt(el.dataset.ts);if(!ts)return;
    var e=getElapsed(ts);
    el.textContent='⏱ '+e.str;
    var card=el.closest('.order-card');if(!card)return;
    var key=card.id.replace('oc-','');
    var wb=document.getElementById('wb-'+key);
    var apt=document.getElementById('apt-'+key);
    var ab=document.getElementById('ab-'+key);
    if(wb)wb.className='warn-badge'+(e.mins>=3&&e.mins<5?' show':'');
    if(apt)apt.className='apurate-tag'+(e.mins>=5?' show':'');
    if(ab)ab.className='apurate-bar'+(e.mins>=5?' show':'');
  });
},1000);

// Tap
function handleTap(key){
  if(!tapMap[key])tapMap[key]={count:0,timer:null};
  var t=tapMap[key];
  clearTimeout(t.timer);t.count++;
  if(t.count===1){
    render();
    t.timer=setTimeout(function(){t.count=0;render();},3000);
  } else {
    t.count=0;clearTimeout(t.timer);completeOrder(key);
  }
}

function completeOrder(key){
  var order=orders[key];if(!order)return;
  recallList.unshift({key:key,order:JSON.parse(JSON.stringify(order)),colorIdx:colorMap[key]||0});
  if(recallList.length>20)recallList.pop();
  var co=JSON.parse(JSON.stringify(order));
  co.completedAt=firebase.database.ServerValue.TIMESTAMP;
  db.ref('completed_orders').push(co).then(function(){
    db.ref('completed_orders').orderByChild('completedAt').once('value',function(s){
      var keys=[];s.forEach(function(c){keys.push(c.key);});
      if(keys.length>20)keys.slice(0,keys.length-20).forEach(function(k){db.ref('completed_orders/'+k).remove();});
    });
  });
  db.ref('orders/'+key+'/status').set('completed');
  delete tapMap[key];
}

// Recall
function openRecall(){buildRecallUI();document.getElementById('recallDrawer').classList.add('open');}
function closeRecall(){document.getElementById('recallDrawer').classList.remove('open');}

function buildRecallUI(){
  if(!recallList.length){document.getElementById('recallList').innerHTML='<div style="display:flex;align-items:center;color:#7a6b8a;font-family:Space Mono,monospace;font-size:11px;padding:16px;">Sin órdenes completadas aún</div>';return;}
  var h='';
  recallList.forEach(function(entry,idx){
    var col=COLORS[entry.colorIdx||0],o=entry.order,items=o.items||[];
    h+='<div class="recall-card" style="border-color:'+col.border+';background:'+col.bg+'" onclick="restoreOrder('+idx+')">';
    h+='<div class="rc-header"><div class="rc-num" style="color:'+col.text+'">#'+String(o.num||0).padStart(2,'0')+'</div><div class="rc-table">📍 '+(o.table||'Sin mesa')+'</div></div>';
    items.forEach(function(item,di){
      h+='<div class="rc-drink" style="color:'+(item.fc||'#f0e8ff')+'">'+(items.length>1?'B'+(di+1)+' ':'')+item.fn+'</div>';
      h+='<div class="rc-size">'+(item.se||'')+' '+(item.sn||'')+(item.soz?' · '+item.soz:'')+'</div>';
      var cells=item.candyCells||[];
      if(cells.length){h+='<div class="rc-cells">';cells.forEach(function(cc){h+='<span class="rc-cell">'+cc.cell+'</span>';});h+='</div>';}
    });
    h+='<div class="rc-tap-hint">TOCA PARA RECUPERAR</div>';
    h+='</div>';
  });
  document.getElementById('recallList').innerHTML=h;
}

function restoreOrder(idx){
  var entry=recallList[idx];if(!entry)return;
  var order=JSON.parse(JSON.stringify(entry.order));
  order.status='pending';order.recalledAt=firebase.database.ServerValue.TIMESTAMP;
  var ref=db.ref('orders').push(order);
  colorMap[ref.key]=entry.colorIdx;
  recallList.splice(idx,1);buildRecallUI();closeRecall();
}
</script>
