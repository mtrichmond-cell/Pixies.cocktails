<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pixies — File Cleaner</title>
<style>
:root{--bg:#0a0010;--purple:#6b00cc;--pink:#ff2d8f;--yellow:#d4ff00;--border:rgba(180,0,255,0.2);--text:#f5e6ff;--muted:#8855aa;--green:#00e676;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,0,204,.25) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,45,143,.15) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;z-index:1;background:rgba(30,0,50,.85);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:18px;}
h1{font-size:22px;font-weight:900;letter-spacing:2px;text-align:center;}
h1 span{color:var(--pink);}
p{font-size:12px;color:var(--muted);line-height:1.6;text-align:center;}
.drop-zone{border:2px dashed rgba(255,45,143,.4);border-radius:14px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{background:rgba(255,45,143,.06);border-color:var(--pink);}
.drop-zone input{display:none;}
.drop-label{font-size:13px;font-weight:700;color:var(--muted);margin-top:8px;}
.status{font-size:12px;font-family:monospace;border-radius:10px;padding:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);line-height:1.8;display:none;}
.status.show{display:block;}
.status .ok{color:var(--green);}
.status .warn{color:var(--yellow);}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;display:none;}
.btn.show{display:block;}
.btn:active{opacity:.85;}
.savings{font-size:11px;color:var(--green);text-align:center;font-weight:700;display:none;}
.savings.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <h1>PIXIES <span>CLEANER</span> <span style="font-size:11px;font-weight:400;color:var(--muted);letter-spacing:1px;">v2.1</span></h1>
  <p>Sube tu <strong>index.html</strong> y este tool reemplaza automáticamente todos los íconos base64 con SimpleIcons CDN, y el logo con Cloudinary.</p>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:36px">📂</div>
    <div class="drop-label">Toca para seleccionar index.html</div>
    <input type="file" id="fileInput" accept=".html"/>
  </div>

  <div class="status" id="status"></div>
  <div class="savings" id="savings"></div>
  <button class="btn" id="downloadBtn" onclick="downloadClean()">⬇ Descargar index_clean.html</button>
</div>

<script>
var LOGO_URL = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774670816/preview_gdumct.png';
var cleanedContent = null;

// Size thresholds (base64 char count ≈ binary bytes × 1.37)
// Logo:    ~200KB PNG  →  ~274K base64 chars  →  threshold: 180000
// WA:      ~60KB PNG   →  ~82K base64 chars   →  threshold: 60000
// IG:      ~40KB PNG   →  ~55K base64 chars   →  threshold: 38000
// Gmail:   ~14KB PNG   →  ~19K base64 chars   →  threshold: 14000
// TikTok:  ~12KB PNG   →  ~16K base64 chars   →  smallest (catch-all)

function classifyBlob(b64len) {
  if (b64len > 180000) return 'logo';
  if (b64len > 60000)  return 'whatsapp';
  if (b64len > 38000)  return 'instagram';
  if (b64len > 14000)  return 'gmail';
  return 'tiktok';
}

function processFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var content = e.target.result;
    var originalSize = content.length;
    var counts = {logo:0, whatsapp:0, instagram:0, gmail:0, tiktok:0};
    var modified = content;

    // Pass 1: replace ALL base64 image blobs by size classification.
    // Catches every page/section regardless of prefix variation.
    modified = modified.replace(/src="data:image\/[^;]+;base64,([A-Za-z0-9+\/]{500,}={0,2})"/g, function(match, b64) {
      var kind = classifyBlob(b64.length);
      counts[kind]++;
      switch (kind) {
        case 'logo':
          return 'src="' + LOGO_URL + '" style="width:100%;height:100%;object-fit:cover"';
        case 'whatsapp':
          return 'src="https://cdn.simpleicons.org/whatsapp/25d366" style="width:32px;height:32px;border-radius:8px"';
        case 'instagram':
          return 'src="https://cdn.simpleicons.org/instagram/ff2d8f" style="width:32px;height:32px;border-radius:8px"';
        case 'gmail':
          return 'src="https://cdn.simpleicons.org/gmail/ea4335" style="width:32px;height:32px;border-radius:8px"';
        case 'tiktok':
          return 'src="https://cdn.simpleicons.org/tiktok/ffffff" style="width:32px;height:32px;border-radius:8px"';
      }
      return match;
    });

    // Pass 2: fix broken src="" icons left by a previous cleaner run.
    // Identifies each icon by its anchor parent href.
    modified = modified.replace(/<a\s[^>]*href="([^"]*)"[^>]*>\s*<img\s[^>]*src=""[^>]*>/g, function(match, href) {
      var cdnSrc = '';
      if (/wa\.me|whatsapp/i.test(href))  cdnSrc = 'https://cdn.simpleicons.org/whatsapp/25d366';
      else if (/instagram/i.test(href))   cdnSrc = 'https://cdn.simpleicons.org/instagram/ff2d8f';
      else if (/tiktok/i.test(href))      cdnSrc = 'https://cdn.simpleicons.org/tiktok/ffffff';
      else if (/gmail|mailto/i.test(href))cdnSrc = 'https://cdn.simpleicons.org/gmail/ea4335';
      if (!cdnSrc) return match;
      var key = cdnSrc.includes('whatsapp') ? 'whatsapp' : cdnSrc.includes('instagram') ? 'instagram' : cdnSrc.includes('tiktok') ? 'tiktok' : 'gmail';
      counts[key]++;
      return match.replace(/src=""/, 'src="' + cdnSrc + '" style="width:32px;height:32px;border-radius:8px"');
    });

    var newSize = modified.length;
    var savedKB = Math.round((originalSize - newSize) / 1024);
    cleanedContent = modified;

    var log = [];
    log.push(counts.whatsapp > 0
      ? '<span class="ok">✓ WhatsApp — ' + counts.whatsapp + ' reemplazado(s)</span>'
      : '<span class="warn">— WhatsApp — no encontrado</span>');
    log.push(counts.instagram > 0
      ? '<span class="ok">✓ Instagram — ' + counts.instagram + ' reemplazado(s)</span>'
      : '<span class="warn">— Instagram — no encontrado</span>');
    log.push(counts.tiktok > 0
      ? '<span class="ok">✓ TikTok — ' + counts.tiktok + ' reemplazado(s)</span>'
      : '<span class="warn">— TikTok — no encontrado</span>');
    log.push(counts.gmail > 0
      ? '<span class="ok">✓ Gmail — ' + counts.gmail + ' reemplazado(s)</span>'
      : '<span class="warn">— Gmail — no encontrado</span>');
    log.push(counts.logo > 0
      ? '<span class="ok">✓ Logo — ' + counts.logo + ' reemplazado(s) con Cloudinary</span>'
      : '<span class="warn">— Logo — no encontrado</span>');

    var statusEl = document.getElementById('status');
    statusEl.innerHTML = log.join('<br/>');
    statusEl.classList.add('show');

    var savingsEl = document.getElementById('savings');
    savingsEl.textContent = '✅ Tamaño reducido en ~' + savedKB + ' KB (' + Math.round(originalSize/1024) + ' KB → ' + Math.round(newSize/1024) + ' KB)';
    savingsEl.classList.add('show');

    document.getElementById('downloadBtn').classList.add('show');
  };
  reader.readAsText(file);
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (file) processFile(file);
});

var dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('over'); });
dropZone.addEventListener('drop', function(e){
  e.preventDefault();
  dropZone.classList.remove('over');
  var file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

function downloadClean() {
  if (!cleanedContent) return;
  var blob = new Blob([cleanedContent], {type: 'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index_clean.html';
  a.click();
}
</script>
</body>
</html>
