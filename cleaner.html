<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pixies — File Cleaner</title>
<style>
:root{--bg:#0a0010;--purple:#6b00cc;--pink:#ff2d8f;--yellow:#d4ff00;--border:rgba(180,0,255,0.2);--text:#f5e6ff;--muted:#8855aa;--green:#00e676;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,0,204,.25) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,45,143,.15) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;z-index:1;background:rgba(30,0,50,.85);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:18px;}
h1{font-size:22px;font-weight:900;letter-spacing:2px;text-align:center;}
h1 span{color:var(--pink);}
p{font-size:12px;color:var(--muted);line-height:1.6;text-align:center;}
.fetch-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:16px;font-weight:900;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 28px rgba(255,45,143,.4);}
.fetch-btn:active{opacity:.85;transform:scale(.98);}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;font-weight:700;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.drop-zone{border:2px dashed rgba(255,45,143,.4);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{background:rgba(255,45,143,.06);border-color:var(--pink);}
.drop-zone input{display:none;}
.drop-label{font-size:12px;font-weight:700;color:var(--muted);margin-top:8px;}
.status{font-size:12px;font-family:monospace;border-radius:10px;padding:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);line-height:1.8;display:none;}
.status.show{display:block;}
.status .ok{color:var(--green);}
.status .warn{color:var(--yellow);}
.status .err{color:#ff6060;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;display:none;}
.btn.show{display:block;}
.btn:active{opacity:.85;}
.savings{font-size:11px;color:var(--green);text-align:center;font-weight:700;display:none;}
.savings.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <h1>PIXIES <span>CLEANER</span> <span style="font-size:11px;font-weight:400;color:var(--muted);letter-spacing:1px;">v4.2</span></h1>
  <p>Íconos · logos · carrito · siguiente paso · 📷 dulces y tamaños</p>

  <button class="fetch-btn" id="fetchBtn" onclick="fetchFromGitHub()">
    🐙 Fetch &amp; Clean desde GitHub
  </button>

  <div class="divider">O sube el archivo</div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:32px">📂</div>
    <div class="drop-label">Toca para seleccionar index2.html</div>
    <input type="file" id="fileInput" accept=".html,.htm,.txt"/>
  </div>

  <div class="status" id="status"></div>
  <div class="savings" id="savings"></div>
  <button class="btn" id="downloadBtn" onclick="downloadClean()">⬇ Descargar index_clean.html</button>
</div>

<script>
var LOGO_URL   = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774670816/preview_gdumct.png';
var NEQUI_URL  = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774927551/IMG_8477_xuh9oh.jpg';
var BANCOL_URL = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774927551/IMG_8483_pk73rq.png';
var VISA_URL   = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774927551/IMG_8491_ix6yng.jpg';
var GITHUB_URL = 'https://raw.githubusercontent.com/mtrichmond-cell/Pixies.cocktails/main/index2.html';
var ICON_STYLE = 'width:32px;height:32px;border-radius:8px';

function classifyBlob(len) {
  if (len > 180000) return 'logo';
  if (len > 60000)  return 'whatsapp';
  if (len > 38000)  return 'instagram';
  if (len > 14000)  return 'gmail';
  return 'tiktok';
}

var cleanedContent = null;

// ── Injected script — event delegation, no function patching ─────────────
var INJECT_SCRIPT = [
'<script id="px-inject">',
'(function(){',

// ── Modal ──
'var ov=document.createElement("div");',
'ov.id="pxModal";',
'ov.style.cssText="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;";',
'ov.innerHTML=\'<div style="position:relative;width:100%;max-width:320px;background:rgba(30,0,50,.97);border:1px solid rgba(180,0,255,.3);border-radius:20px;overflow:hidden;box-shadow:0 0 40px rgba(255,45,143,.3);">\'',
'  +\'<button id="pxClose" style="position:absolute;top:10px;right:10px;background:rgba(255,45,143,.25);border:1px solid rgba(255,45,143,.5);color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;z-index:1;line-height:1;">&#x2715;</button>\'',
'  +\'<div id="pxEmoji" style="display:none;font-size:90px;text-align:center;padding:28px 0 8px;"></div>\'',
'  +\'<img id="pxImg" src="" style="width:100%;display:none;max-height:260px;object-fit:cover;"/>\'',
'  +\'<div style="padding:14px 16px 18px;text-align:center;">\'',
'  +\'<div id="pxName" style="font-family:Bebas Neue,sans-serif;font-size:24px;letter-spacing:3px;color:#f5e6ff;"></div>\'',
'  +\'<div id="pxSub" style="font-size:11px;color:#8855aa;font-weight:700;margin-top:4px;"></div>\'',
'  +\'</div></div>\';',
'document.body.appendChild(ov);',
'document.getElementById("pxClose").onclick=function(){ov.style.display="none";};',
'ov.addEventListener("click",function(e){if(e.target===ov)ov.style.display="none";});',

'window.showPxModal=function(src,emoji,name,sub){',
'  var imgEl=document.getElementById("pxImg"),emEl=document.getElementById("pxEmoji");',
'  if(src){imgEl.src=src;imgEl.style.display="block";emEl.style.display="none";}',
'  else{imgEl.src="";imgEl.style.display="none";emEl.textContent=emoji||"📷";emEl.style.display="block";}',
'  document.getElementById("pxName").textContent=name||"";',
'  document.getElementById("pxSub").textContent=(sub||"")+(src?"":"\u00a0— Foto pr\u00f3ximamente \uD83D\uDCF8");',
'  ov.style.display="flex";',
'};',

// ── Camera button factory ──
'function makeCam(onClick){',
'  var b=document.createElement("button");',
'  b.className="px-cam";',
'  b.style.cssText="background:rgba(255,45,143,.18);border:1px solid rgba(255,45,143,.4);border-radius:8px;padding:3px 8px;font-size:15px;cursor:pointer;margin-left:6px;flex-shrink:0;line-height:1;";',
'  b.textContent="\uD83D\uDCF7";',
'  b.addEventListener("click",function(e){e.stopPropagation();onClick();});',
'  return b;',
'}',

// ── Candy grid — event delegation ──
'document.addEventListener("click",function(e){',
'  var grid=document.getElementById("candyGrid");',
'  if(!grid)return;',
// Find the clicked candy-item
'  var item=e.target;',
'  while(item&&item!==grid){if(item.classList&&item.classList.contains("candy-item"))break;item=item.parentNode;}',
'  if(!item||!item.classList||!item.classList.contains("candy-item"))return;',
// Ignore clicks on the camera button itself
'  if(e.target.classList&&e.target.classList.contains("px-cam"))return;',
// Wait a tick for the toggle to finish
'  setTimeout(function(){',
'    var cam=item.querySelector(".px-cam");',
'    if(item.classList.contains("sel")){',
'      if(cam)return;', // already has button
// Get candy id from onclick attr
'      var oc=item.getAttribute("onclick")||"";',
'      var m=oc.match(/toggleCandy\((\d+)\)/);',
'      if(!m)return;',
'      var id=parseInt(m[1]);',
'      var candy=window.CFG&&window.CFG.candies&&window.CFG.candies.find(function(c){return c.id===id;});',
'      if(!candy)return;',
// Append to stepper if it exists, otherwise to the item directly
'      var target=item.querySelector(".ci-stepper")||item;',
'      target.appendChild(makeCam(function(){showPxModal(candy.img||"",candy.e||"\uD83C\uDF6C",candy.n,"");}));',
'    }else{',
'      if(cam)cam.remove();',
'    }',
'  },60);',
'},true);',

// ── Size grid — event delegation ──
'document.addEventListener("click",function(e){',
'  var grid=document.getElementById("sizeGrid");',
'  if(!grid)return;',
'  var item=e.target;',
'  while(item&&item!==grid){if(item.classList&&item.classList.contains("size-card"))break;item=item.parentNode;}',
'  if(!item||!item.classList||!item.classList.contains("size-card"))return;',
'  if(e.target.classList&&e.target.classList.contains("px-size-cam"))return;',
'  setTimeout(function(){',
// Remove all size cam buttons first
'    document.querySelectorAll(".px-size-cam").forEach(function(b){b.remove();});',
'    if(!item.classList.contains("selected"))return;',
'    var oc=item.getAttribute("onclick")||"";',
'    var m=oc.match(/selectSize\(["\']([^"\']+)["\']\)/);',
'    var sizeId=m?m[1]:null;',
'    var size=window.CFG&&window.CFG.sizes&&(sizeId',
'      ?window.CFG.sizes.find(function(s){return s.id===sizeId;})',
'      :null);',
// Fallback: match by name text
'    if(!size){',
'      var nameEl=item.querySelector(".sc-name");',
'      if(nameEl)size=window.CFG&&window.CFG.sizes&&window.CFG.sizes.find(function(s){return s.n===nameEl.textContent.trim();});',
'    }',
'    if(!size)return;',
'    var btn=document.createElement("button");',
'    btn.className="px-size-cam";',
'    btn.style.cssText="background:rgba(255,45,143,.18);border:1px solid rgba(255,45,143,.4);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:800;cursor:pointer;margin-top:10px;display:flex;align-items:center;gap:6px;color:#f5e6ff;font-family:Nunito,sans-serif;";',
'    btn.innerHTML="\uD83D\uDCF7 <span>Ver foto</span>";',
'    btn.addEventListener("click",function(ev){',
'      ev.stopPropagation();',
'      showPxModal(size.img||"",size.e||"\uD83E\uDD64",size.n,size.oz+" \u2014 "+size.d);',
'    });',
'    item.appendChild(btn);',
'  },60);',
'},true);',

'})();',
'<\/script>'
].join('\n');

function processContent(content) {
  var originalSize = content.length;
  var counts = {
    waFix:0, whatsapp:0, instagram:0, tiktok:0, gmail:0,
    logo:0, nequi:0, bancolombia:0, visa:0,
    heroLogo:0, bancoCard:0, visaCard:0,
    nequiLogo:0, bancoLogo:0, cartLayout:0,
    flavorCta:0, modalInject:0
  };
  var modified = content;

  // ── Pass 1: WhatsApp direct — wa.me href → force WA icon ─────────────
  modified = modified.replace(
    /(<a[^>]*href="https:\/\/wa\.me[^"]*"[^>]*>)<img[^>]*\/>/g,
    function(match, aOpen) {
      counts.waFix++;
      return aOpen + '<img src="https://cdn.simpleicons.org/whatsapp/25d366" style="' + ICON_STYLE + '"/>';
    }
  );

  // ── Pass 2: Base64 payment icons ──────────────────────────────────────
  modified = modified.replace(/(?:src=)?(['"`]?)data:image\/[^;]+;base64,([A-Za-z0-9+\/]{200,}={0,2})\1/g,
    function(match, quote, b64, offset, original) {
      var start = Math.max(0, offset - 600);
      var context = original.substring(start, offset + 80).toLowerCase();
      if (/nequi/.test(context)) {
        counts.nequi++;
        if (match.startsWith('src=')) return 'src="' + NEQUI_URL + '"';
        return quote + NEQUI_URL + quote;
      }
      if (/bancolombia/.test(context)) {
        counts.bancolombia++;
        if (match.startsWith('src=')) return 'src="' + BANCOL_URL + '"';
        return quote + BANCOL_URL + quote;
      }
      if (/visa|mastercard|tarjeta/.test(context)) {
        counts.visa++;
        if (match.startsWith('src=')) return 'src="' + VISA_URL + '"';
        return quote + VISA_URL + quote;
      }
      return match;
    }
  );

  // ── Pass 3: Base64 social icons by size ───────────────────────────────
  modified = modified.replace(/src="data:image\/[^;]+;base64,([A-Za-z0-9+\/]{500,}={0,2})"/g,
    function(match, b64) {
      var kind = classifyBlob(b64.length);
      counts[kind]++;
      switch (kind) {
        case 'logo':      return 'src="' + LOGO_URL + '" style="width:100%;height:100%;object-fit:cover"';
        case 'whatsapp':  return 'src="https://cdn.simpleicons.org/whatsapp/25d366" style="' + ICON_STYLE + '"';
        case 'instagram': return 'src="https://cdn.simpleicons.org/instagram/ff2d8f" style="' + ICON_STYLE + '"';
        case 'gmail':     return 'src="https://cdn.simpleicons.org/gmail/ea4335" style="' + ICON_STYLE + '"';
        case 'tiktok':    return 'src="https://cdn.simpleicons.org/tiktok/ffffff" style="' + ICON_STYLE + '"';
      }
      return match;
    }
  );

  // ── Pass 4: Anchor-based social icons ─────────────────────────────────
  var ICON_MAP = [
    {test:/wa\.me|whatsapp/i, key:'whatsapp', src:'https://cdn.simpleicons.org/whatsapp/25d366'},
    {test:/instagram/i,       key:'instagram',src:'https://cdn.simpleicons.org/instagram/ff2d8f'},
    {test:/tiktok/i,          key:'tiktok',   src:'https://cdn.simpleicons.org/tiktok/ffffff'},
    {test:/gmail|mailto/i,    key:'gmail',    src:'https://cdn.simpleicons.org/gmail/ea4335', onclick:true},
  ];
  modified = modified.replace(/(<a\b[^>]*href="([^"]*)"([^>]*)>)([\s\S]*?)(<img\b[^>]*>)/g,
    function(match, aOpen, href, aRest, between, imgTag) {
      var icon = null;
      for (var i = 0; i < ICON_MAP.length; i++) {
        var m = ICON_MAP[i];
        if (m.test.test(href)||(m.onclick&&m.test.test(aRest))){icon=m;break;}
      }
      if (!icon) return match;
      counts[icon.key]++;
      var alt=''; var am=imgTag.match(/alt="([^"]*)"/);
      if (am) alt=' alt="'+am[1]+'"';
      return aOpen+between+'<img src="'+icon.src+'" style="'+ICON_STYLE+'"'+alt+'/>';
    }
  );

  // ── Pass 5: Hero logo circle ──────────────────────────────────────────
  var heroLogoRx = /(<div class="logo-wrap"><img\s)[^>]+(\/><\/div>)/;
  if (heroLogoRx.test(modified)) {
    modified = modified.replace(heroLogoRx,
      '$1src="'+LOGO_URL+'" style="width:100%;height:100%;object-fit:cover"$2');
    counts.heroLogo++;
  }

  // ── Pass 6: Bancolombia pay card ──────────────────────────────────────
  modified = modified.replace(
    /(<img class="pay-icon" src=")[^"]+(" style="border-radius:50%"\/>)/g,
    function(m,pre,post){counts.bancoCard++;return pre+BANCOL_URL+post;}
  );

  // ── Pass 7: Credit/debit pay icon ─────────────────────────────────────
  modified = modified.replace(
    /<img class="pay-icon" src="https:\/\/cdn\.simpleicons\.org\/gmail\/ea4335"[^>]*\/>/g,
    function(){
      counts.visaCard++;
      return '<img class="pay-icon" src="'+VISA_URL+'" style="width:40px;height:40px;border-radius:10px;object-fit:contain"/>';
    }
  );

  // ── Pass 8: Nequi ps-logo ─────────────────────────────────────────────
  var nRx = /<img class="ps-logo" src="https:\/\/cdn\.simpleicons\.org\/tiktok\/ffffff" style="width:32px;height:32px;border-radius:8px"\/>/;
  if (nRx.test(modified)) {
    modified = modified.replace(nRx,
      '<img class="ps-logo" src="'+NEQUI_URL+'" style="width:70px;height:70px;border-radius:16px;object-fit:cover"/>');
    counts.nequiLogo++;
  }

  // ── Pass 9: Bancolombia ps-logo ───────────────────────────────────────
  modified = modified.replace(
    /<img class="ps-logo" src="https:\/\/cdn\.simpleicons\.org\/tiktok\/ffffff"[^>]*\/>/g,
    function(){
      counts.bancoLogo++;
      return '<img class="ps-logo" src="'+BANCOL_URL+'" style="width:70px;height:70px;border-radius:50%;object-fit:cover"/>';
    }
  );

  // ── Pass 10: Cart layout ──────────────────────────────────────────────
  var c1 = modified.replace(/\.cta-float\{[^}]+\}/,
    '.cta-float{position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;background:linear-gradient(135deg,#6b00cc,#ff2d8f);z-index:60;transform:translateY(120px);transition:transform .3s;box-shadow:0 -4px 20px rgba(255,45,143,.4)}');
  if(c1!==modified){modified=c1;counts.cartLayout++;}

  var c2 = modified.replace(/\.cart-bubble\{[^}]+\}/,
    '.cart-bubble{position:fixed;bottom:14px;right:12px;z-index:201;background:rgba(15,0,30,0.92);border:2px solid rgba(255,45,143,0.6);border-radius:50px;padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(255,45,143,.5);cursor:pointer;backdrop-filter:blur(8px)}');
  if(c2!==modified){modified=c2;counts.cartLayout++;}

  // ── Pass 11: Flavor CTA → full-width SIGUIENTE PASO bar ──────────────
  var fRx = /<div id="flavorCta"[^>]*>[\s\S]*?<\/div>/;
  var fNew = '<div id="flavorCta" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;padding:14px 16px 28px;background:linear-gradient(135deg,#6b00cc,#ff2d8f);box-shadow:0 -4px 20px rgba(255,45,143,.4);"><button onclick="confirmFlavors()" style="width:100%;max-width:480px;display:block;margin:0 auto;padding:16px;border:none;border-radius:14px;background:transparent;color:white;font-size:18px;font-weight:900;letter-spacing:2px;cursor:pointer;font-family:\'Bebas Neue\',sans-serif;">SIGUIENTE PASO \u2192</button></div>';
  if (fRx.test(modified)) { modified = modified.replace(fRx, fNew); counts.flavorCta++; }

  // ── Pass 12: Inject camera + modal before </body> ─────────────────────
  if (modified.indexOf('px-inject') === -1) {
    modified = modified.replace('</body>', INJECT_SCRIPT + '\n</body>');
    counts.modalInject++;
  }

  var newSize = modified.length;
  cleanedContent = modified;

  var log = [];
  log.push(counts.waFix      >0?'<span class="ok">✓ WhatsApp (wa.me) — '     +counts.waFix     +' fix(es)</span>':'<span class="warn">— WhatsApp — sin cambios</span>');
  log.push(counts.whatsapp   >0?'<span class="ok">✓ WhatsApp (anchor) — '    +counts.whatsapp  +' fix(es)</span>':'<span class="warn">— WhatsApp anchor — sin cambios</span>');
  log.push(counts.instagram  >0?'<span class="ok">✓ Instagram — '             +counts.instagram +' fix(es)</span>':'<span class="warn">— Instagram — sin cambios</span>');
  log.push(counts.tiktok     >0?'<span class="ok">✓ TikTok — '                +counts.tiktok    +' fix(es)</span>':'<span class="warn">— TikTok — sin cambios</span>');
  log.push(counts.gmail      >0?'<span class="ok">✓ Gmail — '                 +counts.gmail     +' fix(es)</span>':'<span class="warn">— Gmail — sin cambios</span>');
  log.push(counts.heroLogo   >0?'<span class="ok">✓ Logo círculo — Cloudinary</span>':'<span class="warn">— Logo círculo — sin cambios</span>');
  log.push(counts.nequiLogo  >0?'<span class="ok">✓ Logo Nequi — Cloudinary</span>':'<span class="warn">— Logo Nequi — sin cambios</span>');
  log.push(counts.bancoLogo  >0?'<span class="ok">✓ Logo Bancolombia — Cloudinary</span>':'<span class="warn">— Logo Bancolombia — sin cambios</span>');
  log.push(counts.bancoCard  >0?'<span class="ok">✓ Tarjeta Bancolombia — correcta</span>':'<span class="warn">— Tarjeta Bancolombia — sin cambios</span>');
  log.push(counts.visaCard   >0?'<span class="ok">✓ Tarjeta Crédito/Débito — correcta</span>':'<span class="warn">— Tarjeta Crédito — sin cambios</span>');
  log.push(counts.cartLayout >0?'<span class="ok">✓ Layout carrito — barra + burbuja</span>':'<span class="warn">— Layout carrito — sin cambios</span>');
  log.push(counts.flavorCta  >0?'<span class="ok">✓ Sabores — SIGUIENTE PASO barra</span>':'<span class="warn">— Sabores CTA — sin cambios</span>');
  log.push(counts.modalInject>0?'<span class="ok">✓ Modal 📷 + cámara dulces/tamaños — inyectado</span>':'<span class="warn">— Modal/cámara — ya presente</span>');

  document.getElementById('status').innerHTML = log.join('<br/>');
  document.getElementById('status').classList.add('show');
  document.getElementById('savings').textContent =
    '✅ Procesado: '+Math.round(originalSize/1024)+' KB → '+Math.round(newSize/1024)+' KB';
  document.getElementById('savings').classList.add('show');
  document.getElementById('downloadBtn').classList.add('show');
}

function fetchFromGitHub() {
  var btn=document.getElementById('fetchBtn'),statusEl=document.getElementById('status');
  btn.disabled=true; btn.textContent='⏳ Descargando…';
  statusEl.innerHTML='<span class="ok">Conectando a GitHub…</span>';
  statusEl.classList.add('show');
  fetch(GITHUB_URL+'?t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(t){btn.disabled=false;btn.textContent='🐙 Fetch & Clean desde GitHub';processContent(t);})
    .catch(function(e){btn.disabled=false;btn.textContent='🐙 Fetch & Clean desde GitHub';
      statusEl.innerHTML='<span class="err">❌ '+e.message+' — sube el archivo manualmente.</span>';});
}

function processFile(f){var r=new FileReader();r.onload=function(e){processContent(e.target.result);};r.readAsText(f);}
document.getElementById('fileInput').addEventListener('change',function(e){if(e.target.files[0])processFile(e.target.files[0]);});
var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});

function downloadClean(){
  if(!cleanedContent)return;
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([cleanedContent],{type:'text/html'}));
  a.download='index_clean.html';a.click();
}
</script>
</body>
</html>
