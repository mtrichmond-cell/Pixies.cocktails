<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pixies — File Cleaner</title>
<style>
:root{--bg:#0a0010;--purple:#6b00cc;--pink:#ff2d8f;--yellow:#d4ff00;--border:rgba(180,0,255,0.2);--text:#f5e6ff;--muted:#8855aa;--green:#00e676;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,0,204,.25) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,45,143,.15) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;z-index:1;background:rgba(30,0,50,.85);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:18px;}
h1{font-size:22px;font-weight:900;letter-spacing:2px;text-align:center;}
h1 span{color:var(--pink);}
p{font-size:12px;color:var(--muted);line-height:1.6;text-align:center;}
.fetch-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:16px;font-weight:900;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 28px rgba(255,45,143,.4);}
.fetch-btn:active{opacity:.85;transform:scale(.98);}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;font-weight:700;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.drop-zone{border:2px dashed rgba(255,45,143,.4);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{background:rgba(255,45,143,.06);border-color:var(--pink);}
.drop-zone input{display:none;}
.drop-label{font-size:12px;font-weight:700;color:var(--muted);margin-top:8px;}
.status{font-size:12px;font-family:monospace;border-radius:10px;padding:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);line-height:1.8;display:none;}
.status.show{display:block;}
.status .ok{color:var(--green);}
.status .warn{color:var(--yellow);}
.status .err{color:#ff6060;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;display:none;}
.btn.show{display:block;}
.btn:active{opacity:.85;}
.savings{font-size:11px;color:var(--green);text-align:center;font-weight:700;display:none;}
.savings.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <h1>PIXIES <span>CLEANER</span> <span style="font-size:11px;font-weight:400;color:var(--muted);letter-spacing:1px;">v3.1</span></h1>
  <p>Reemplaza todos los íconos base64 con SimpleIcons CDN y el logo con Cloudinary.</p>

  <button class="fetch-btn" id="fetchBtn" onclick="fetchFromGitHub()">
    🐙 Fetch &amp; Clean desde GitHub
  </button>

  <div class="divider">O sube el archivo</div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:32px">📂</div>
    <div class="drop-label">Toca para seleccionar index.html</div>
    <input type="file" id="fileInput" accept=".html,.htm,.txt"/>
  </div>

  <div class="status" id="status"></div>
  <div class="savings" id="savings"></div>
  <button class="btn" id="downloadBtn" onclick="downloadClean()">⬇ Descargar index_clean.html</button>
</div>

<script>
var LOGO_URL   = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774670816/preview_gdumct.png';
var GITHUB_URL = 'https://raw.githubusercontent.com/mtrichmond-cell/Pixies.cocktails/main/index.html';
var cleanedContent = null;

// Map anchor href patterns → CDN icon URLs
var ICON_MAP = [
  { test: /wa\.me|whatsapp/i,  key: 'whatsapp',  src: 'https://cdn.simpleicons.org/whatsapp/25d366'  },
  { test: /instagram/i,        key: 'instagram', src: 'https://cdn.simpleicons.org/instagram/ff2d8f' },
  { test: /tiktok/i,           key: 'tiktok',    src: 'https://cdn.simpleicons.org/tiktok/ffffff'    },
  { test: /gmail|mailto/i,     key: 'gmail',     src: 'https://cdn.simpleicons.org/gmail/ea4335'     },
];
var ICON_STYLE = 'width:32px;height:32px;border-radius:8px';

function processContent(content) {
  var originalSize = content.length;
  var counts = {logo:0, whatsapp:0, instagram:0, gmail:0, tiktok:0};
  var modified = content;

  // Pass 1: replace large base64 logo blob by size
  modified = modified.replace(/src="data:image\/[^;]+;base64,([A-Za-z0-9+\/]{180000,}={0,2})"/g, function() {
    counts.logo++;
    return 'src="' + LOGO_URL + '" style="width:100%;height:100%;object-fit:cover"';
  });

  // Pass 2 (UNCONDITIONAL): find every <a href="..."><img ...></a> whose href
  // matches a social platform and fully rewrite the img src + style,
  // no matter what the src currently is (base64, empty, wrong CDN, anything).
  // Regex captures: anchor open tag, href value, rest of anchor, img tag.
  modified = modified.replace(/(<a\b[^>]*href="([^"]*)"[^>]*>)([\s\S]*?)(<img\b[^>]*>)/g, function(match, aOpen, href, between, imgTag) {
    var icon = null;
    for (var i = 0; i < ICON_MAP.length; i++) {
      if (ICON_MAP[i].test.test(href)) { icon = ICON_MAP[i]; break; }
    }
    if (!icon) return match;
    counts[icon.key]++;
    // Rebuild the img tag with correct src and style, preserving alt if present
    var alt = '';
    var altMatch = imgTag.match(/alt="([^"]*)"/);
    if (altMatch) alt = ' alt="' + altMatch[1] + '"';
    var newImg = '<img src="' + icon.src + '" style="' + ICON_STYLE + '"' + alt + '/>';
    return aOpen + between + newImg;
  });

  var newSize = modified.length;
  var savedKB = Math.round((originalSize - newSize) / 1024);
  cleanedContent = modified;

  var log = [];
  log.push(counts.whatsapp  > 0 ? '<span class="ok">✓ WhatsApp — '  + counts.whatsapp  + ' reemplazado(s)</span>' : '<span class="warn">— WhatsApp — no encontrado</span>');
  log.push(counts.instagram > 0 ? '<span class="ok">✓ Instagram — ' + counts.instagram + ' reemplazado(s)</span>' : '<span class="warn">— Instagram — no encontrado</span>');
  log.push(counts.tiktok    > 0 ? '<span class="ok">✓ TikTok — '    + counts.tiktok    + ' reemplazado(s)</span>' : '<span class="warn">— TikTok — no encontrado</span>');
  log.push(counts.gmail     > 0 ? '<span class="ok">✓ Gmail — '     + counts.gmail     + ' reemplazado(s)</span>' : '<span class="warn">— Gmail — no encontrado</span>');
  log.push(counts.logo      > 0 ? '<span class="ok">✓ Logo — '      + counts.logo      + ' con Cloudinary</span>'  : '<span class="warn">— Logo — no encontrado</span>');

  var statusEl = document.getElementById('status');
  statusEl.innerHTML = log.join('<br/>');
  statusEl.classList.add('show');

  var savingsEl = document.getElementById('savings');
  savingsEl.textContent = '✅ Reducido ~' + savedKB + ' KB (' + Math.round(originalSize/1024) + ' KB → ' + Math.round(newSize/1024) + ' KB)';
  savingsEl.classList.add('show');

  document.getElementById('downloadBtn').classList.add('show');
}

function fetchFromGitHub() {
  var btn      = document.getElementById('fetchBtn');
  var statusEl = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ Descargando…';
  statusEl.innerHTML = '<span class="ok">Conectando a GitHub…</span>';
  statusEl.classList.add('show');

  fetch(GITHUB_URL + '?t=' + Date.now())
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(function(text) {
      btn.disabled = false;
      btn.textContent = '🐙 Fetch & Clean desde GitHub';
      processContent(text);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '🐙 Fetch & Clean desde GitHub';
      statusEl.innerHTML = '<span class="err">❌ ' + err.message + ' — sube el archivo manualmente.</span>';
    });
}

function processFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) { processContent(e.target.result); };
  reader.readAsText(file);
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

var dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function(){  dz.classList.remove('over'); });
dz.addEventListener('drop',      function(e){
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});

function downloadClean() {
  if (!cleanedContent) return;
  var blob = new Blob([cleanedContent], {type:'text/html'});
  var a    = document.createElement('a');
  a.href   = URL.createObjectURL(blob);
  a.download = 'index_clean.html';
  a.click();
}
</script>
</body>
</html>
