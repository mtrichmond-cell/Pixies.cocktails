<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
body { background: #0a0010; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 40px; }
h3 { color: #8855aa; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
.row { display: flex; gap: 16px; align-items: center; }
.icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.icon-wrap span { font-size: 10px; color: #8855aa; }
img { width: 40px; height: 40px; border-radius: 10px; padding: 6px; }
.wa-bg { background: rgba(37,211,102,.15); border: 1px solid rgba(37,211,102,.35); }
.ig-bg { background: rgba(255,45,143,.15); border: 1px solid rgba(255,45,143,.35); }
.tt-bg { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); }
</style>
</head>
<body>
<h3>SimpleIcons CDN — vista previa</h3>
<div class="row">
  <div class="icon-wrap">
    <img class="wa-bg" src="https://cdn.simpleicons.org/whatsapp/25d366"/>
    <span>WhatsApp</span>
  </div>
  <div class="icon-wrap">
    <img class="ig-bg" src="https://cdn.simpleicons.org/instagram/ff2d8f"/>
    <span>Instagram</span>
  </div>
  <div class="icon-wrap">
    <img class="tt-bg" src="https://cdn.simpleicons.org/tiktok/ffffff"/>
    <span>TikTok</span>
  </div>
</div>
<h3>vs. texto plano actual</h3>
<div class="row">
  <div style="background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.35);border-radius:8px;padding:6px 12px;color:#25d366;font-size:11px;font-weight:900">WA</div>
  <div style="background:rgba(255,45,143,.12);border:1px solid rgba(255,45,143,.35);border-radius:8px;padding:6px 12px;color:#ff2d8f;font-size:11px;font-weight:900">IG</div>
  <div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;color:#fff;font-size:11px;font-weight:900">TT</div>
</div>
</body>
</html>
