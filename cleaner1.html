<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixies OG Cleaner</title>
<style>
  body { background: #0a0010; color: #f5e6ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: rgba(30,0,50,0.85); border: 1px solid rgba(180,0,255,0.2); border-radius: 20px; padding: 36px 40px; text-align: center; max-width: 440px; width: 100%; }
  h1 { color: #ff2d8f; font-size: 22px; margin: 0 0 8px; }
  p { color: #8855aa; font-size: 13px; margin: 0 0 28px; }
  button { background: linear-gradient(135deg, #6b00cc, #ff2d8f); color: white; border: none; border-radius: 12px; padding: 15px 36px; font-size: 17px; font-weight: 900; letter-spacing: 2px; cursor: pointer; font-family: inherit; box-shadow: 0 6px 28px rgba(255,45,143,.4); width: 100%; }
  button:disabled { opacity: 0.4; cursor: default; }
  #log { margin-top: 22px; text-align: left; font-size: 12px; line-height: 2; min-height: 24px; }
  .ok  { color: #d4ff00; }
  .err { color: #ff4444; }
  .inf { color: #8855aa; }
</style>
</head>
<body>
<div class="card">
  <h1>✨ Pixies OG Cleaner</h1>
  <p>Polls GitHub → fixes og:image → downloads index_clean.html</p>
  <button id="btn" onclick="run()">RUN CLEANER</button>
  <div id="log"></div>
</div>

<script>
const RAW_URL    = 'https://raw.githubusercontent.com/mtrichmond-cell/Pixies.cocktails/main/index.html';
const PROXY      = 'https://corsproxy.io/?' + encodeURIComponent(RAW_URL);
const CLOUDINARY = 'https://res.cloudinary.com/deeloaqth/image/upload/v1774670816/preview_gdumct.png';

function log(msg, cls = 'inf') {
  document.getElementById('log').innerHTML += `<div class="${cls}">${msg}</div>`;
}

async function run() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  log('⏳ Fetching index.html from GitHub...');
  let html;
  try {
    const res = await fetch(PROXY);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    html = await res.text();
    log('✅ File fetched successfully.', 'ok');
  } catch (e) {
    log('❌ Fetch failed: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  const ogPattern = /<meta property="og:image" content="[^"]*" \/>/;
  const newTag    = `<meta property="og:image" content="${CLOUDINARY}" />`;

  if (!ogPattern.test(html)) {
    log('⚠️ og:image tag not found — nothing to fix.', 'err');
    btn.disabled = false;
    return;
  }

  const before = html.match(ogPattern)[0];
  html = html.replace(ogPattern, newTag);
  log(`🔧 Old: ${before}`, 'inf');
  log(`✅ New: ${newTag}`, 'ok');

  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index_clean.html';
  a.click();
  log('🎉 index_clean.html downloaded — push to GitHub!', 'ok');
  btn.disabled = false;
}
</script>
</body>
</html>
